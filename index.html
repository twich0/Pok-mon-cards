<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG: Mega Evolution Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Montserrat:ital,wght@0,700;1,700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Base Reset & Dynamic Variables */
        :root {
            --bg-color: #0d0614;
            --text-color: #ffffff;
            --theme-glow: rgba(197, 75, 253, 0.6);
            --accent-banner: linear-gradient(90deg, #1d9d0e, #aaff00);
            --transition-speed: 0.8s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Full-Screen Site Wrapper */
        .site-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color var(--transition-speed) ease;
        }

        /* Navigation Header */
        header {
            background-color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 5%;
            border-bottom: 2px solid #1a1a1a;
            z-index: 10;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-main {
            background: #ffcc00;
            color: #003a70;
            font-weight: 900;
            font-size: 0.9rem;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1.5px solid #003a70;
            text-transform: uppercase;
        }

        .logo-sub {
            background: #e60012;
            color: #fff;
            font-size: 0.6rem;
            font-weight: bold;
            padding: 2px 5px;
            text-transform: uppercase;
            border-radius: 2px;
        }

        /* Header Controls */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .cart-btn {
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            transition: opacity 0.2s, transform 0.2s;
        }

        .cart-btn:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        .cart-icon {
            position: relative;
            width: 18px;
            height: 12px;
            border: 2px solid #fff;
            border-top: none;
            border-radius: 0 0 3px 3px;
            margin-top: 2px;
            margin-left: 2px;
        }

        .cart-icon::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -4px;
            width: 6px;
            height: 2px;
            background-color: #fff;
            box-shadow: 2px 2px 0 #fff;
        }

        .cart-icon::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 1px;
            width: 3px;
            height: 3px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 10px 0 0 #fff; 
        }

        .cart-badge {
            position: absolute;
            top: -3px;
            right: -5px;
            background-color: #e60012;
            color: #fff;
            font-size: 0.6rem;
            font-weight: bold;
            min-width: 13px;
            height: 13px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1px;
            border: 1px solid #000;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .menu-btn span {
            display: inline-block;
            width: 18px;
            height: 2px;
            background-color: #fff;
            position: relative;
        }

        .menu-btn span::before, .menu-btn span::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 2px;
            background-color: #fff;
            left: 0;
        }
        .menu-btn span::before { top: -6px; }
        .menu-btn span::after { top: 6px; }

        /* Main Hero Layout */
        .hero-section {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 60px 0; /* Base container padding */
            text-align: center;
            overflow: hidden;
        }

        /* Cinematic Background Container - Stays at the top of the stack flow */
        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 400px; /* Atmospheric height allocation */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            overflow: hidden;
            
            /* Powerful bottom fade-out to blend seamlessly into the background color below */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0.3) 75%, transparent 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0.3) 75%, transparent 100%);
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transform: scale(1.05);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 0.65; /* Slightly higher opacity since text isn't overlapping directly */
            transform: scale(1.15);
        }

        /* Full-bleed background cover */
        .character-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: drop-shadow(0 0 100px var(--theme-glow)) saturate(1.15);
            transition: filter var(--transition-speed) ease;
        }

        /* Title & Text Section - Positioned below the cinematic slider wrapper */
        .brand-announcement {
            width: 100%;
            position: relative;
            z-index: 3;
            margin-top: -30px; /* Pulled up slightly to integrate nicely with the background fade */
            padding: 0 20px;
        }

        .mega-evolution-banner {
            display: inline-block;
            background: var(--accent-banner);
            color: #000;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 5px 16px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            transition: background var(--transition-speed) ease;
        }

        .pitch-black-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 0 30px var(--theme-glow);
            margin-bottom: 8px;
            transition: text-shadow var(--transition-speed) ease;
        }

        @media (max-width: 600px) {
            .pitch-black-title {
                font-size: 2.2rem;
            }
            .slider-wrapper {
                height: 280px;
            }
        }

        .card-name {
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #f1ecf6;
        }

        /* Interactive Showcase Cards Section */
        .card-display-section {
            width: 100%;
            max-width: 480px;
            margin: 40px auto 0 auto;
            text-align: center;
            position: relative;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
        }

        .card-category-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffdc00;
            margin-bottom: 18px;
            font-weight: 800;
        }

        .card-navigation-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .nav-arrow {
            background: linear-gradient(135deg, #2b113a 0%, #0d0415 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            width: 36px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .nav-arrow:hover {
            transform: scale(1.08);
            border-color: rgba(186, 85, 211, 0.6);
            box-shadow: 0 0 10px rgba(186, 85, 211, 0.3);
        }

        .nav-arrow:active {
            transform: scale(0.95);
        }

        /* Card Scale */
        .showcase-card {
            width: 180px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(255, 220, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.25s ease;
            opacity: 1;
        }

        .showcase-card.fade-out {
            opacity: 0.2;
            transform: scale(0.95);
        }

        .showcase-card:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 25px rgba(255, 220, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="site-wrapper" id="siteWrapper">
        
        <header>
            <div class="logo-container">
                <div class="logo-main">Pokémon</div>
                <div class="logo-sub">TCG</div>
            </div>
            
            <div class="header-controls">
                <button class="cart-btn" title="View Cart">
                    <div class="cart-icon"></div>
                    <div class="cart-badge">0</div>
                </button>
                <button class="menu-btn">Menu <span></span></button>
            </div>
        </header>

        <div class="hero-section">

            <!-- Cinematic Background Slider at the Top of layout -->
            <div class="slider-wrapper">
                <!-- Slide 1: Chandelure -->
                <div class="slide active" data-index="0">
                    <img src="https://d1i787aglh9bmb.cloudfront.net/assets/img/home/featured-switcher/me05/booster-art-3-2x.jpg" alt="Mega Chandelure ex" class="character-img">
                </div>
                
                <!-- Slide 2: Darkrai -->
                <div class="slide" data-index="1">
                    <img src="https://d1i787aglh9bmb.cloudfront.net/assets/img/home/featured-switcher/me05/booster-art-2-2x.jpg" alt="Mega Darkrai ex" class="character-img">
                </div>

                <!-- Slide 3: Excadrill -->
                <div class="slide" data-index="2">
                    <img src="https://d1i787aglh9bmb.cloudfront.net/assets/img/home/featured-switcher/me05/booster-art-4-2x.jpg" alt="Mega Excadrill ex" class="character-img">
                </div>
            </div>

            <!-- Foreground Brand Title Blocks Positioned BELOW the backgrounds -->
            <div class="brand-announcement">
                <div class="mega-evolution-banner" id="promoBanner">Mega Evolution</div>
                <h1 class="pitch-black-title" id="expansionTitle">Pitch Black</h1>
                <div class="card-name" id="pokemonName">Mega Chandelure ex</div>
            </div>

            <!-- Card Category Navigation Section -->
            <div class="card-display-section">
                <div class="card-category-title" id="categoryTitle">Mega Zeraora ex Category</div>
                
                <div class="card-navigation-container">
                    <button class="nav-arrow" id="prevCatBtn" aria-label="Previous Card">&lt;</button>
                    
                    <img src="https://dz3we2x72f7ol.cloudfront.net/expansions/pitch-black/en-us/KD5B_EN_27-2x.png" id="categoryCard" alt="Category Showcase Card" class="showcase-card">
                    
                    <button class="nav-arrow" id="nextCatBtn" aria-label="Next Card">&gt;</button>
                </div>
            </div>

        </div>

    </div>

    <script>
        // Hero Background Slider Setup
        const slidesData = [
            {
                bgColor: "#0d0614",
                themeGlow: "rgba(186, 85, 211, 0.7)",
                accentBanner: "linear-gradient(90deg, #bb44f0, #ff007f)",
                expansionTitle: "Pitch Black",
                pokemonName: "Mega Chandelure ex"
            },
            {
                bgColor: "#051308",
                themeGlow: "rgba(0, 230, 115, 0.7)",
                accentBanner: "linear-gradient(90deg, #009933, #33cc66)",
                expansionTitle: "Pitch Black",
                pokemonName: "Mega Darkrai ex"
            },
            {
                bgColor: "#140502",
                themeGlow: "rgba(255, 85, 0, 0.7)",
                accentBanner: "linear-gradient(90deg, #e65c00, #f9d423)",
                expansionTitle: "Pitch Black",
                pokemonName: "Mega Excadrill ex"
            }
        ];

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const siteWrapper = document.getElementById('siteWrapper');
        const expansionTitle = document.getElementById('expansionTitle');
        const pokemonName = document.getElementById('pokemonName');
        
        let autoPlayInterval;

        function updateSlide(index) {
            slides.forEach((slide, i) => {
                if (i === index) {
                    slide.classList.add('active');
                } else {
                    slide.classList.remove('active');
                }
            });

            const data = slidesData[index];
            siteWrapper.style.setProperty('--bg-color', data.bgColor);
            siteWrapper.style.setProperty('--theme-glow', data.themeGlow);
            siteWrapper.style.setProperty('--accent-banner', data.accentBanner);
            expansionTitle.textContent = data.expansionTitle;
            pokemonName.textContent = data.pokemonName;

            currentSlide = index;
        }

        function nextSlide() {
            let target = (currentSlide + 1) % slides.length;
            updateSlide(target);
        }

        function startTimer() {
            autoPlayInterval = setInterval(nextSlide, 4500);
        }

        startTimer();

        // --- Category Slider Logic ---
        const categoryCards = [
            {
                image: "https://dz3we2x72f7ol.cloudfront.net/expansions/pitch-black/en-us/KD5B_EN_27-2x.png",
                title: "Mega Zeraora ex Category"
            },
            {
                image: "https://dz3we2x72f7ol.cloudfront.net/expansions/pitch-black/en-us/KD5B_EN_65-2x.png",
                title: "Mega Evolution Category"
            }
        ];

        let currentCatIndex = 0;
        const categoryCard = document.getElementById('categoryCard');
        const categoryTitle = document.getElementById('categoryTitle');
        const prevCatBtn = document.getElementById('prevCatBtn');
        const nextCatBtn = document.getElementById('nextCatBtn');

        function updateCategoryCard(newIndex) {
            categoryCard.classList.add('fade-out');
            
            setTimeout(() => {
                currentCatIndex = newIndex;
                categoryCard.src = categoryCards[currentCatIndex].image;
                categoryTitle.textContent = categoryCards[currentCatIndex].title;
                categoryCard.classList.remove('fade-out');
            }, 200);
        }

        prevCatBtn.addEventListener('click', () => {
            let index = (currentCatIndex - 1 + categoryCards.length) % categoryCards.length;
            updateCategoryCard(index);
        });

        nextCatBtn.addEventListener('click', () => {
            let index = (currentCatIndex + 1) % categoryCards.length;
            updateCategoryCard(index);
        });
    </script>
</body>
</html>
